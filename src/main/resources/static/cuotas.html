<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuotas - Empresa Constructora</title>
  <style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#f4f6f8; }
header { background:#1a3a5c; color:white; padding:16px 32px; display:flex; justify-content:space-between; align-items:center; }
header h1 { font-size:18px; }
.nav-links a { color:#aac4e0; text-decoration:none; margin-left:16px; font-size:13px; }
.nav-links a:hover { color:white; }
.container { padding:24px 32px; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
h2 { color:#1a3a5c; font-size:20px; }
.btn { padding:9px 18px; border:none; border-radius:7px; font-size:13px; font-weight:bold; cursor:pointer; }
.btn-primary { background:#1a3a5c; color:white; }
.btn-primary:hover { background:#2a5a8c; }
.btn-danger { background:#c0392b; color:white; }
.btn-sm { padding:5px 11px; font-size:12px; border-radius:5px; border:none; cursor:pointer; font-weight:bold; }
.btn-info { background:#d0e8ff; color:#1a3a5c; }
.resumen { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.card { background:white; border-radius:10px; padding:16px 20px; box-shadow:0 2px 8px rgba(0,0,0,.08); }
.card h4 { font-size:11px; color:#888; text-transform:uppercase; margin-bottom:6px; }
.card p { font-size:20px; font-weight:bold; color:#1a3a5c; }
table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.1); }
thead { background:#1a3a5c; color:white; }
th,td { padding:11px 14px; text-align:left; font-size:13px; }
tr:nth-child(even) { background:#f0f4f8; }
tr:hover { background:#dce8f5; }
.badge { padding:3px 10px; border-radius:12px; font-size:11px; font-weight:bold; }
.badge-pendiente { background:#fff3cd; color:#856404; }
.badge-pagado { background:#d4edda; color:#155724; }
.badge-vencido { background:#f8d7da; color:#721c24; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center; }
.overlay.open { display:flex; }
.modal { background:white; border-radius:12px; width:90%; max-width:480px; }
.modal-header { padding:20px 24px 14px; border-bottom:1px solid #e0e0e0; display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { color:#1a3a5c; font-size:16px; }
.close-btn { background:none; border:none; font-size:22px; cursor:pointer; color:#888; }
.modal-body { padding:20px 24px; }
.form-group { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
label { font-size:12px; font-weight:bold; color:#555; text-transform:uppercase; }
input,select { padding:9px 11px; border:1px solid #ccc; border-radius:6px; font-size:13px; width:100%; }
.modal-footer { padding:14px 24px; border-top:1px solid #e0e0e0; display:flex; justify-content:flex-end; gap:10px; }
.toast { position:fixed; bottom:24px; right:24px; background:#1a3a5c; color:white; padding:12px 20px; border-radius:8px; font-size:13px; display:none; z-index:999; }
.toast.error { background:#c0392b; }
.toast.show { display:block; }
</style>
</head>
<body>
<header>
  <h1>🏗️ Empresa Constructora</h1>
  <div class="nav-links">
    <a href="/index.html">← Dashboard</a>
    <a href="/contratos.html">Contratos</a>
    <a href="/pagos.html">Pagos</a>
    <a href="/clientes.html">Clientes</a>
  </div>
</header>

<div class="container">
  <div class="top-bar">
    <h2 id="titulo">📋 Cuotas del contrato</h2>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary" onclick="abrirModalGenerar()">+ Generar Plan</button>
      <button class="btn btn-danger" onclick="eliminarPlan()">🗑 Eliminar Plan</button>
      <a href="/contratos.html" class="btn" style="background:#e0e0e0;text-decoration:none;">← Volver</a>
    </div>
  </div>

  <div class="resumen" id="resumen" style="display:none">
    <div class="card"><h4>Monto Total</h4><p id="r-total">-</p></div>
    <div class="card"><h4>Pagado</h4><p id="r-pagado" style="color:#155724">-</p></div>
    <div class="card"><h4>Saldo</h4><p id="r-saldo" style="color:#c0392b">-</p></div>
    <div class="card"><h4>Cuotas</h4><p id="r-cuotas">-</p></div>
  </div>

  <table>
    <thead>
    <tr>
      <th>#</th><th>Cuota</th><th>Monto (Bs.)</th>
      <th>Vencimiento</th><th>Estado</th><th>Fecha Pago</th><th>Acciones</th>
    </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<!-- Modal generar plan -->
<div class="overlay" id="overlayGenerar">
  <div class="modal">
    <div class="modal-header">
      <h3>Generar Plan de Cuotas</h3>
      <button class="close-btn" onclick="cerrarModal('overlayGenerar')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Número de cuotas</label>
        <input type="number" id="numeroCuotas" min="1" max="120" value="12">
      </div>
      <div class="form-group">
        <label>Fecha primera cuota</label>
        <input type="date" id="fechaPrimeraCuota">
      </div>
      <div class="form-group">
        <label>Días entre cuotas</label>
        <input type="number" id="diasEntreCuotas" value="30" min="1">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="cerrarModal('overlayGenerar')" style="background:#e0e0e0">Cancelar</button>
      <button class="btn btn-primary" onclick="generarPlan()">Generar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN = localStorage.getItem('token');
if (!TOKEN) location.href='/login.html';
const API = 'http://localhost:8080/api';
const h = { 'Authorization':'Bearer '+TOKEN, 'Content-Type':'application/json' };

const params = new URLSearchParams(location.search);
const idContrato = params.get('contrato');
if (!idContrato) location.href='/contratos.html';

async function api(url, opts={}) {
  const r = await fetch(API+url, { headers:h, ...opts });
  if (r.status===401||r.status===403) { localStorage.clear(); location.href='/login.html'; }
  return r;
}

function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(err?' error':'');
  setTimeout(()=>t.className='toast',3000);
}

function fmt(n) { return n ? Number(n).toLocaleString('es-BO',{minimumFractionDigits:2}) : '0.00'; }

async function cargarResumen() {
  const r = await api('/cuotas/resumen/'+idContrato);
  if (!r.ok) return;
  const d = await r.json();
  document.getElementById('titulo').textContent = '📋 Cuotas — ' + (d.nombreProyecto||'Contrato #'+idContrato);
  document.getElementById('r-total').textContent = 'Bs. '+fmt(d.montoTotal);
  document.getElementById('r-pagado').textContent = 'Bs. '+fmt(d.montoPagado);
  document.getElementById('r-saldo').textContent = 'Bs. '+fmt(d.saldoPendiente);
  document.getElementById('r-cuotas').textContent =
    d.cuotasPagadas+' pag / '+d.cuotasPendientes+' pend / '+d.cuotasVencidas+' venc';
  document.getElementById('resumen').style.display = 'grid';
}

async function cargar() {
  const r = await api('/cuotas/contrato/'+idContrato);
  const data = await r.json();
  const tbody = document.getElementById('tabla');
  if (!data.length) {
    tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:30px;color:#888">Sin cuotas — usa "Generar Plan"</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(c => `
    <tr>
      <td>${c.idCuota}</td>
      <td><strong>Cuota ${c.numeroCuota}</strong></td>
      <td>Bs. ${fmt(c.montoEsperado)}</td>
      <td>${c.fechaVencimiento}</td>
      <td><span class="badge badge-${c.estado.toLowerCase()}">${c.estado}</span></td>
      <td>${c.fechaPagoReal || '-'}</td>
      <td>
        ${c.estado !== 'Pagado' ? `<button class="btn-sm btn-info" onclick="editarCuota(${c.idCuota}, ${c.montoEsperado}, '${c.fechaVencimiento}')">Editar</button>` : ''}
      </td>
    </tr>`).join('');
  cargarResumen();
}

function abrirModalGenerar() {
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('fechaPrimeraCuota').value = hoy;
  document.getElementById('overlayGenerar').classList.add('open');
}

function cerrarModal(id) { document.getElementById(id).classList.remove('open'); }

async function generarPlan() {
  const body = {
    idContrato: +idContrato,
    numeroCuotas: +document.getElementById('numeroCuotas').value,
    fechaPrimeraCuota: document.getElementById('fechaPrimeraCuota').value,
    diasEntreCuotas: +document.getElementById('diasEntreCuotas').value
  };
  if (!body.numeroCuotas || !body.fechaPrimeraCuota) return toast('Complete los campos', true);
  const r = await api('/cuotas/generar', { method:'POST', body:JSON.stringify(body) });
  if (r.ok) { cerrarModal('overlayGenerar'); toast('Plan generado'); cargar(); }
  else { const e=await r.json(); toast(e.message||'Error al generar', true); }
}

async function eliminarPlan() {
  if (!confirm('¿Eliminar todo el plan de cuotas? Solo si ninguna está pagada.')) return;
  const r = await api('/cuotas/contrato/'+idContrato, { method:'DELETE' });
  if (r.ok) { toast('Plan eliminado'); cargar(); }
  else { const e=await r.json(); toast(e.message||'Error al eliminar', true); }
}

async function editarCuota(id, monto, fecha) {
  const nuevoMonto = prompt('Nuevo monto (Bs.):', monto);
  if (nuevoMonto === null) return;
  const nuevaFecha = prompt('Nueva fecha vencimiento (YYYY-MM-DD):', fecha);
  if (nuevaFecha === null) return;
  const r = await api('/cuotas/'+id, {
    method:'PUT',
    body: JSON.stringify({ montoEsperado: +nuevoMonto, fechaVencimiento: nuevaFecha })
  });
  if (r.ok) { toast('Cuota actualizada'); cargar(); }
  else toast('Error al actualizar', true);
}

cargar();
</script>
</body>
</html>
