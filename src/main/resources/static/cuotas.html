<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contratos - Empresa Constructora</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#f4f6f8; }
header { background:#1a3a5c; color:white; padding:16px 32px; display:flex; justify-content:space-between; align-items:center; }
header h1 { font-size:18px; }
.nav-links a { color:#aac4e0; text-decoration:none; margin-left:16px; font-size:13px; }
.nav-links a:hover { color:white; }
.container { padding:24px 32px; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
h2 { color:#1a3a5c; font-size:20px; }
.btn { padding:9px 18px; border:none; border-radius:7px; font-size:13px; font-weight:bold; cursor:pointer; }
.btn-primary { background:#1a3a5c; color:white; }
.btn-primary:hover { background:#2a5a8c; }
.btn-sm { padding:5px 11px; font-size:12px; border-radius:5px; border:none; cursor:pointer; font-weight:bold; }
.btn-info { background:#d0e8ff; color:#1a3a5c; }
.btn-warning { background:#fff3cd; color:#856404; }
table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.1); }
thead { background:#1a3a5c; color:white; }
th,td { padding:11px 14px; text-align:left; font-size:13px; }
tr:nth-child(even) { background:#f0f4f8; }
tr:hover { background:#dce8f5; }
.badge { padding:3px 10px; border-radius:12px; font-size:11px; font-weight:bold; }
.badge-vigente { background:#d4edda; color:#155724; }
.badge-finalizado { background:#e2e3e5; color:#383d41; }
.badge-anulado { background:#f8d7da; color:#721c24; }
/* Modal */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center; }
.overlay.open { display:flex; }
.modal { background:white; border-radius:12px; width:90%; max-width:540px; max-height:90vh; overflow-y:auto; }
.modal-header { padding:20px 24px 14px; border-bottom:1px solid #e0e0e0; display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { color:#1a3a5c; font-size:16px; }
.close-btn { background:none; border:none; font-size:22px; cursor:pointer; color:#888; line-height:1; }
.modal-body { padding:20px 24px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group.full { grid-column:1/-1; }
label { font-size:12px; font-weight:bold; color:#555; text-transform:uppercase; }
input,select { padding:9px 11px; border:1px solid #ccc; border-radius:6px; font-size:13px; width:100%; }
input:focus,select:focus { outline:none; border-color:#1a3a5c; }
.modal-footer { padding:14px 24px; border-top:1px solid #e0e0e0; display:flex; justify-content:flex-end; gap:10px; }
.toast { position:fixed; bottom:24px; right:24px; background:#1a3a5c; color:white; padding:12px 20px; border-radius:8px; font-size:13px; display:none; z-index:999; }
.toast.error { background:#c0392b; }
.toast.show { display:block; }
.saldo { color:#c0392b; font-weight:bold; }
.pagado { color:#155724; }
</style>
</head>
<body>
<header>
  <h1>🏗️ Empresa Constructora</h1>
  <div class="nav-links">
    <a href="/index.html">← Dashboard</a>
    <a href="/proyectos.html">Proyectos</a>
    <a href="/clientes.html">Clientes</a>
    <a href="/pagos.html">Pagos</a>
    <a href="/cuotas.html">Cuotas</a>
  </div>
</header>

<div class="container">
  <div class="top-bar">
    <h2>📄 Contratos</h2>
    <button class="btn btn-primary" onclick="abrirModal()">+ Nuevo Contrato</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th><th>Cliente</th><th>Proyecto</th><th>Tipo</th>
        <th>Monto Total (Bs.)</th><th>Pagado (Bs.)</th><th>Saldo (Bs.)</th>
        <th>Inicio</th><th>Estado</th><th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<!-- Modal nuevo contrato -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <h3>Nuevo Contrato</h3>
      <button class="close-btn" onclick="cerrarModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Cliente</label>
          <select id="idCliente" onchange="cargarProyectosCliente()"><option value="">Seleccionar...</option></select>
        </div>
        <div class="form-group">
          <label>Proyecto</label>
          <select id="idProyecto"><option value="">Seleccionar cliente primero</option></select>
        </div>
        <div class="form-group">
          <label>Tipo de Contrato</label>
          <select id="idTipoContrato"><option value="">Seleccionar...</option></select>
        </div>
        <div class="form-group">
          <label>Monto Total (Bs.)</label>
          <input type="number" id="montoTotal" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
          <label>Fecha Firma</label>
          <input type="date" id="fechaFirma">
        </div>
        <div class="form-group">
          <label>Fecha Inicio</label>
          <input type="date" id="fechaInicio">
        </div>
        <div class="form-group">
          <label>Fecha Fin (opcional)</label>
          <input type="date" id="fechaFin">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="cerrarModal()" style="background:#e0e0e0">Cancelar</button>
      <button class="btn btn-primary" onclick="guardar()">Crear Contrato</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN = localStorage.getItem('token');
if (!TOKEN) location.href='/login.html';
const API = 'http://localhost:8080/api';
const h = { 'Authorization':'Bearer '+TOKEN, 'Content-Type':'application/json' };

async function api(url, opts={}) {
  const r = await fetch(API+url, { headers:h, ...opts });
  if (r.status===401||r.status===403) { localStorage.clear(); location.href='/login.html'; }
  return r;
}

function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(err?' error':'');
  setTimeout(()=>t.className='toast',3000);
}

function fmt(n) { return n ? Number(n).toLocaleString('es-BO',{minimumFractionDigits:2}) : '0.00'; }

async function cargar() {
  const r = await api('/contratos');
  const data = await r.json();
  const tbody = document.getElementById('tabla');
  if (!data.length) { tbody.innerHTML='<tr><td colspan="10" style="text-align:center;padding:30px;color:#888">Sin contratos registrados</td></tr>'; return; }
  tbody.innerHTML = data.map(c => `
    <tr>
      <td>${c.idContrato}</td>
      <td><strong>${c.nombreCliente}</strong></td>
      <td>${c.nombreProyecto}</td>
      <td>${c.tipoContrato}</td>
      <td class="pagado">${fmt(c.montoTotal)}</td>
      <td>${fmt(c.montoPagado)}</td>
      <td class="saldo">${fmt(c.saldoPendiente)}</td>
      <td>${c.fechaInicio}</td>
      <td><span class="badge badge-${c.estado.toLowerCase()}">${c.estado}</span></td>
      <td>
        <button class="btn-sm btn-info" onclick="verCuotas(${c.idContrato})">Cuotas</button>
        <button class="btn-sm btn-info" onclick="verPagos(${c.idContrato})" style="margin-left:4px">Pagos</button>
      </td>
    </tr>`).join('');
}

async function cargarSelects() {
  const [cli, tipos] = await Promise.all([
    api('/clientes').then(r=>r.json()),
    fetch(API+'/tipos-contrato', {headers:h}).then(r=>r.ok?r.json():[
      {idTipoContrato:1,nombre:'Contrato a precio fijo'},
      {idTipoContrato:2,nombre:'Contrato por administración'},
      {idTipoContrato:3,nombre:'Contrato llave en mano'}
    ])
  ]);
  const selCli = document.getElementById('idCliente');
  cli.forEach(c => selCli.innerHTML += `<option value="${c.idCliente}">${c.nombre}${c.apellido?' '+c.apellido:''}</option>`);
  const selTipo = document.getElementById('idTipoContrato');
  tipos.forEach(t => selTipo.innerHTML += `<option value="${t.idTipoContrato}">${t.nombre}</option>`);
}

async function cargarProyectosCliente() {
  const idCliente = document.getElementById('idCliente').value;
  const sel = document.getElementById('idProyecto');
  sel.innerHTML = '<option value="">Cargando...</option>';
  if (!idCliente) { sel.innerHTML='<option value="">Seleccionar cliente primero</option>'; return; }
  const r = await api('/proyectos/cliente/'+idCliente);
  const data = await r.json();
  sel.innerHTML = '<option value="">Seleccionar proyecto...</option>';
  data.forEach(p => sel.innerHTML += `<option value="${p.idProyecto}">${p.nombre}</option>`);
}

function abrirModal() { document.getElementById('overlay').classList.add('open'); }
function cerrarModal() { document.getElementById('overlay').classList.remove('open'); }

async function guardar() {
  const body = {
    idCliente: +document.getElementById('idCliente').value,
    idProyecto: +document.getElementById('idProyecto').value,
    idTipoContrato: +document.getElementById('idTipoContrato').value,
    montoTotal: +document.getElementById('montoTotal').value,
    fechaFirma: document.getElementById('fechaFirma').value,
    fechaInicio: document.getElementById('fechaInicio').value,
    fechaFin: document.getElementById('fechaFin').value || null,
  };
  if (!body.idCliente||!body.idProyecto||!body.idTipoContrato||!body.montoTotal||!body.fechaFirma||!body.fechaInicio) {
    return toast('Complete todos los campos requeridos', true);
  }
  const r = await api('/contratos', { method:'POST', body:JSON.stringify(body) });
  if (r.ok) { cerrarModal(); toast('Contrato creado exitosamente'); cargar(); }
  else { const e=await r.json(); toast(e.message||'Error al crear contrato', true); }
}

function verCuotas(id) { location.href='/cuotas.html?contrato='+id; }
function verPagos(id)  { location.href='/pagos.html?contrato='+id; }

cargar();
cargarSelects();
</script>
</body>
</html>
