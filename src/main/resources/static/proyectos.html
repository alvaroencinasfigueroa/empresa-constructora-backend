<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyectos - Empresa Constructora</title>
    <style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#f4f6f8; }
header { background:#1a3a5c; color:white; padding:16px 32px; display:flex; justify-content:space-between; align-items:center; }
header h1 { font-size:18px; }
.nav-links a { color:#aac4e0; text-decoration:none; margin-left:16px; font-size:13px; }
.nav-links a:hover { color:white; }
.container { padding:24px 32px; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:10px; flex-wrap:wrap; }
h2 { color:#1a3a5c; font-size:20px; }
.search { padding:9px 14px; border:1px solid #ccc; border-radius:7px; font-size:13px; width:240px; }
.btn { padding:9px 18px; border:none; border-radius:7px; font-size:13px; font-weight:bold; cursor:pointer; }
.btn-primary { background:#1a3a5c; color:white; }
.btn-primary:hover { background:#2a5a8c; }
.btn-sm { padding:5px 10px; font-size:12px; border-radius:5px; border:none; cursor:pointer; font-weight:bold; margin-right:4px; }
.btn-edit { background:#d0e8ff; color:#1a3a5c; }
.btn-del { background:#f8d7da; color:#721c24; }
.btn-contract { background:#d4edda; color:#155724; }
table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.1); }
thead { background:#1a3a5c; color:white; }
th,td { padding:11px 14px; text-align:left; font-size:13px; }
tr:nth-child(even) { background:#f0f4f8; }
tr:hover { background:#dce8f5; }
.badge { padding:3px 10px; border-radius:12px; font-size:11px; font-weight:bold; }
.badge-ejecucion { background:#d4edda; color:#155724; }
.badge-planificado { background:#fff3cd; color:#856404; }
.badge-finalizado { background:#e2e3e5; color:#383d41; }
.barra-fondo { background:#e0e0e0; border-radius:4px; height:8px; width:100px; }
.barra-avance { background:#1a3a5c; height:8px; border-radius:4px; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center; }
.overlay.open { display:flex; }
.modal { background:white; border-radius:12px; width:90%; max-width:580px; max-height:90vh; overflow-y:auto; }
.modal-header { padding:20px 24px 14px; border-bottom:1px solid #e0e0e0; display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { color:#1a3a5c; font-size:16px; }
.close-btn { background:none; border:none; font-size:22px; cursor:pointer; color:#888; }
.modal-body { padding:20px 24px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group.full { grid-column:1/-1; }
label { font-size:12px; font-weight:bold; color:#555; text-transform:uppercase; }
input,select,textarea { padding:9px 11px; border:1px solid #ccc; border-radius:6px; font-size:13px; width:100%; font-family:Arial,sans-serif; }
textarea { resize:vertical; min-height:60px; }
.modal-footer { padding:14px 24px; border-top:1px solid #e0e0e0; display:flex; justify-content:flex-end; gap:10px; }
.toast { position:fixed; bottom:24px; right:24px; background:#1a3a5c; color:white; padding:12px 20px; border-radius:8px; font-size:13px; display:none; z-index:999; }
.toast.error { background:#c0392b; }
.toast.show { display:block; }
</style>
</head>
<body>
<header>
    <h1>🏗️ Empresa Constructora</h1>
    <div class="nav-links">
        <a href="/index.html">← Dashboard</a>
        <a href="/contratos.html">Contratos</a>
        <a href="/clientes.html">Clientes</a>
    </div>
</header>

<div class="container">
    <div class="top-bar">
        <h2>📋 Proyectos</h2>
        <div style="display:flex;gap:10px;align-items:center">
            <input class="search" type="text" id="busqueda" placeholder="Buscar proyecto..." oninput="filtrar()">
            <button class="btn btn-primary" onclick="abrirModal()">+ Nuevo Proyecto</button>
        </div>
    </div>

    <table>
        <thead>
        <tr><th>#</th><th>Nombre</th><th>Ciudad</th><th>Inicio</th><th>Fin Estimado</th><th>Presupuesto (Bs.)</th><th>Avance</th><th>Estado</th><th>Acciones</th></tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</div>

<div class="overlay" id="overlay">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-titulo">Nuevo Proyecto</h3>
            <button class="close-btn" onclick="cerrarModal()">×</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editId">
            <div class="form-grid">
                <div class="form-group full">
                    <label>Nombre del Proyecto</label>
                    <input type="text" id="fNombre" placeholder="Ej: Residencial Los Pinos">
                </div>
                <div class="form-group full">
                    <label>Descripción</label>
                    <textarea id="fDesc" placeholder="Descripción del proyecto..."></textarea>
                </div>
                <div class="form-group">
                    <label>Cliente</label>
                    <select id="fCliente"><option value="">Seleccionar...</option></select>
                </div>
                <div class="form-group">
                    <label>Ciudad</label>
                    <input type="text" id="fCiudad" placeholder="Cochabamba">
                </div>
                <div class="form-group full">
                    <label>Dirección de Obra</label>
                    <input type="text" id="fDireccion" placeholder="Av. / Calle, zona">
                </div>
                <div class="form-group">
                    <label>Fecha Inicio</label>
                    <input type="date" id="fInicio">
                </div>
                <div class="form-group">
                    <label>Fecha Fin Estimada</label>
                    <input type="date" id="fFin">
                </div>
                <div class="form-group">
                    <label>Presupuesto Aprobado (Bs.)</label>
                    <input type="number" id="fPresupuesto" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>% Avance</label>
                    <input type="number" id="fAvance" min="0" max="100" step="0.01" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="fEstado">
                        <option value="Planificado">Planificado</option>
                        <option value="En ejecucion">En ejecución</option>
                        <option value="Finalizado">Finalizado</option>
                        <option value="Suspendido">Suspendido</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="cerrarModal()" style="background:#e0e0e0">Cancelar</button>
            <button class="btn btn-primary" onclick="guardar()">Guardar</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN = localStorage.getItem('token');
if (!TOKEN) location.href='/login.html';
const API = 'http://localhost:8080/api';
const h = { 'Authorization':'Bearer '+TOKEN, 'Content-Type':'application/json' };
let todos = [];

const params = new URLSearchParams(location.search);
const clienteParam = params.get('cliente');

async function api(url, opts={}) {
  const r = await fetch(API+url, {headers:h, ...opts});
  if (r.status===401||r.status===403) { localStorage.clear(); location.href='/login.html'; }
  return r;
}

function toast(msg, err=false) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(err?' error':'');
  setTimeout(()=>t.className='toast',3000);
}

function fmt(n) { return n ? Number(n).toLocaleString('es-BO') : '-'; }

async function cargar() {
  const url = clienteParam ? '/proyectos/cliente/'+clienteParam : '/proyectos';
  const r = await api(url);
  todos = await r.json();
  renderizar(todos);
}

function renderizar(data) {
  const tbody = document.getElementById('tabla');
  if (!data.length) { tbody.innerHTML='<tr><td colspan="9" style="text-align:center;padding:30px;color:#888">Sin proyectos registrados</td></tr>'; return; }
  tbody.innerHTML = data.map(p => {
    const est = (p.estado||'').toLowerCase();
    const badge = est.includes('ejecuci') ? 'ejecucion' : est.includes('finaliz') ? 'finalizado' : 'planificado';
    const avance = p.porcentajeAvance || 0;
    return `
    <tr>
      <td>${p.idProyecto}</td>
      <td><strong>${p.nombre}</strong></td>
      <td>${p.ciudad||'-'}</td>
      <td>${p.fechaInicio}</td>
      <td>${p.fechaFinEstimada||'-'}</td>
      <td>Bs. ${fmt(p.presupuestoAprobado)}</td>
      <td>
        <div class="barra-fondo"><div class="barra-avance" style="width:${Math.min(avance,100)}%"></div></div>
        <small>${avance}%</small>
      </td>
      <td><span class="badge badge-${badge}">${p.estado}</span></td>
      <td>
        <button class="btn-sm btn-contract" onclick="verContratos(${p.idProyecto})">Contrato</button>
        <button class="btn-sm btn-edit" onclick="abrirEditar(${p.idProyecto})">Editar</button>
        <button class="btn-sm btn-del" onclick="eliminar(${p.idProyecto})">Eliminar</button>
      </td>
    </tr>`;
  }).join('');
}

function filtrar() {
  const q = document.getElementById('busqueda').value.toLowerCase();
  renderizar(todos.filter(p => (p.nombre+' '+p.ciudad+' '+p.estado).toLowerCase().includes(q)));
}

async function cargarClientes() {
  const r = await api('/clientes');
  const data = await r.json();
  const sel = document.getElementById('fCliente');
  data.forEach(c => sel.innerHTML += `<option value="${c.idCliente}">${c.nombre}${c.apellido?' '+c.apellido:''}</option>`);
}

function abrirModal() {
  document.getElementById('editId').value='';
  document.getElementById('modal-titulo').textContent='Nuevo Proyecto';
  ['fNombre','fDesc','fCiudad','fDireccion'].forEach(id=>document.getElementById(id).value='');
  ['fInicio','fFin'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fPresupuesto').value='';
  document.getElementById('fAvance').value='0';
  document.getElementById('fEstado').value='Planificado';
  document.getElementById('fCliente').value='';
  document.getElementById('overlay').classList.add('open');
}

function cerrarModal() { document.getElementById('overlay').classList.remove('open'); }

async function abrirEditar(id) {
  const r = await api('/proyectos/'+id);
  const p = await r.json();
  document.getElementById('editId').value=p.idProyecto;
  document.getElementById('modal-titulo').textContent='Editar Proyecto';
  document.getElementById('fNombre').value=p.nombre||'';
  document.getElementById('fDesc').value=p.descripcion||'';
  document.getElementById('fCiudad').value=p.ciudad||'';
  document.getElementById('fDireccion').value=p.direccionObra||'';
  document.getElementById('fInicio').value=p.fechaInicio||'';
  document.getElementById('fFin').value=p.fechaFinEstimada||'';
  document.getElementById('fPresupuesto').value=p.presupuestoAprobado||'';
  document.getElementById('fAvance').value=p.porcentajeAvance||0;
  document.getElementById('fEstado').value=p.estado||'Planificado';
  document.getElementById('overlay').classList.add('open');
}

async function guardar() {
  const id = document.getElementById('editId').value;
  const idCliente = document.getElementById('fCliente').value;
  const body = {
    nombre: document.getElementById('fNombre').value,
    descripcion: document.getElementById('fDesc').value||null,
    ciudad: document.getElementById('fCiudad').value,
    direccionObra: document.getElementById('fDireccion').value,
    fechaInicio: document.getElementById('fInicio').value,
    fechaFinEstimada: document.getElementById('fFin').value||null,
    presupuestoAprobado: +document.getElementById('fPresupuesto').value||null,
    porcentajeAvance: +document.getElementById('fAvance').value||0,
    estado: document.getElementById('fEstado').value,
    cliente: idCliente ? { idCliente: +idCliente } : null
  };
  if (!body.nombre||!body.fechaInicio) return toast('Nombre y fecha de inicio son requeridos', true);
  const url = id ? '/proyectos/'+id : '/proyectos';
  const method = id ? 'PUT' : 'POST';
  const r = await api(url, {method, body:JSON.stringify(body)});
  if (r.ok) { cerrarModal(); toast(id?'Proyecto actualizado':'Proyecto creado'); cargar(); }
  else { const e=await r.json(); toast(e.message||'Error al guardar proyecto', true); }
}

async function eliminar(id) {
  if (!confirm('¿Eliminar este proyecto?')) return;
  const r = await api('/proyectos/'+id, {method:'DELETE'});
  if (r.ok) { toast('Proyecto eliminado'); cargar(); }
  else toast('No se puede eliminar (tiene contratos o empleados asociados)', true);
}

function verContratos(id) { location.href='/contratos.html?proyecto='+id; }

cargar();
cargarClientes();
</script>
</body>
</html>
