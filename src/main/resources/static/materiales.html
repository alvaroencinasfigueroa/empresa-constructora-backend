<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Materiales - Empresa Constructora</title>
    <style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#f4f6f8; }
header { background:#1a3a5c; color:white; padding:16px 32px; display:flex; justify-content:space-between; align-items:center; }
header h1 { font-size:18px; }
.nav-links a { color:#aac4e0; text-decoration:none; margin-left:16px; font-size:13px; }
.nav-links a:hover { color:white; }
.container { padding:24px 32px; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:10px; flex-wrap:wrap; }
h2 { color:#1a3a5c; font-size:20px; }
.search { padding:9px 14px; border:1px solid #ccc; border-radius:7px; font-size:13px; width:260px; }
.btn { padding:9px 18px; border:none; border-radius:7px; font-size:13px; font-weight:bold; cursor:pointer; }
.btn-primary { background:#1a3a5c; color:white; }
.btn-primary:hover { background:#2a5a8c; }
.btn-sm { padding:5px 10px; font-size:12px; border-radius:5px; border:none; cursor:pointer; font-weight:bold; margin-right:4px; }
.btn-edit { background:#d0e8ff; color:#1a3a5c; }
.btn-del { background:#f8d7da; color:#721c24; }
table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.1); }
thead { background:#1a3a5c; color:white; }
th,td { padding:11px 14px; text-align:left; font-size:13px; }
tr:nth-child(even) { background:#f0f4f8; }
tr:hover { background:#dce8f5; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center; }
.overlay.open { display:flex; }
.modal { background:white; border-radius:12px; width:90%; max-width:520px; max-height:90vh; overflow-y:auto; }
.modal-header { padding:20px 24px 14px; border-bottom:1px solid #e0e0e0; display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { color:#1a3a5c; font-size:16px; }
.close-btn { background:none; border:none; font-size:22px; cursor:pointer; color:#888; }
.modal-body { padding:20px 24px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group.full { grid-column:1/-1; }
label { font-size:12px; font-weight:bold; color:#555; text-transform:uppercase; }
input,select { padding:9px 11px; border:1px solid #ccc; border-radius:6px; font-size:13px; width:100%; }
.modal-footer { padding:14px 24px; border-top:1px solid #e0e0e0; display:flex; justify-content:flex-end; gap:10px; }
.toast { position:fixed; bottom:24px; right:24px; background:#1a3a5c; color:white; padding:12px 20px; border-radius:8px; font-size:13px; display:none; z-index:999; }
.toast.error { background:#c0392b; }
.toast.show { display:block; }
    </style>
</head>
<body>
<header>
    <h1>🏗️ Empresa Constructora</h1>
    <div class="nav-links">
        <a href="/index.html">← Dashboard</a>
    </div>
</header>

<div class="container">
    <div class="top-bar">
        <h2>🧱 Materiales</h2>
        <div style="display:flex;gap:10px;align-items:center">
            <input class="search" type="text" id="busqueda" placeholder="Buscar material..." oninput="filtrar()">
            <button class="btn btn-primary" onclick="abrirModal()">+ Nuevo Material</button>
        </div>
    </div>

    <table>
        <thead>
        <!-- columna Especificación agregada -->
        <tr><th>#</th><th>Nombre</th><th>Especificación</th><th>Unidad</th><th>Descripción</th><th>Precio Ref. (Bs.)</th><th>Acciones</th></tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</div>

<div class="overlay" id="overlay">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-titulo">Nuevo Material</h3>
            <button class="close-btn" onclick="cerrarModal()">×</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editId">
            <div class="form-grid">
                <div class="form-group full">
                    <label>Nombre</label>
                    <input type="text" id="fNombre" placeholder="Ej: Cemento Portland">
                </div>
                <!-- campo Especificación agregado -->
                <div class="form-group full">
                    <label>Especificación</label>
                    <input type="text" id="fEspecificacion" placeholder="Ej: Hueco 6x12x24, Gambote, 2 pulgadas...">
                </div>
                <div class="form-group">
                    <label>Unidad</label>
                    <input type="text" id="fUnidad" placeholder="Ej: bolsa, m3, metro">
                </div>
                <div class="form-group">
                    <label>Precio Referencial (Bs.)</label>
                    <input type="number" id="fPrecio" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group full">
                    <label>Descripción</label>
                    <input type="text" id="fDescripcion" placeholder="Descripción del material">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="cerrarModal()" style="background:#e0e0e0">Cancelar</button>
            <button class="btn btn-primary" onclick="guardar()">Guardar</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN = localStorage.getItem('token');
if (!TOKEN) location.href='/login.html';
const API = 'http://localhost:8080/api';
const h = { 'Authorization':'Bearer '+TOKEN, 'Content-Type':'application/json' };
let todos = [];

async function api(url, opts={}) {
    const r = await fetch(API+url, {headers:h, ...opts});
    if (r.status===401||r.status===403) { localStorage.clear(); location.href='/login.html'; }
    return r;
}

function toast(msg, err=false) {
    const t = document.getElementById('toast');
    t.textContent=msg; t.className='toast show'+(err?' error':'');
    setTimeout(()=>t.className='toast', 3000);
}

async function cargar() {
    const r = await api('/materiales');
    todos = await r.json();
    renderizar(todos);
}

function renderizar(data) {
    const tbody = document.getElementById('tabla');
    if (!data.length) {
        tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:30px;color:#888">Sin materiales registrados</td></tr>';
        return;
    }
    // columna especificacion agregada, colspan corregido a 7
    tbody.innerHTML = data.map(m => `
        <tr>
            <td>${m.idMaterial}</td>
            <td><strong>${m.nombre}</strong></td>
            <td>${m.especificacion||'-'}</td>
            <td>${m.unidad||'-'}</td>
            <td>${m.descripcion||'-'}</td>
            <td>${m.precioRef ? Number(m.precioRef).toLocaleString('es-BO', {minimumFractionDigits:2}) : '-'}</td>
            <td>
                <button class="btn-sm btn-edit" onclick="abrirEditar(${m.idMaterial})">Editar</button>
                <button class="btn-sm btn-del" onclick="eliminar(${m.idMaterial})">Eliminar</button>
            </td>
        </tr>`).join('');
}

// filtrar incluye especificacion
function filtrar() {
    const q = document.getElementById('busqueda').value.toLowerCase();
    renderizar(todos.filter(m =>
        (m.nombre+' '+(m.especificacion||'')+' '+(m.unidad||'')+' '+(m.descripcion||'')).toLowerCase().includes(q)
    ));
}

function abrirModal() {
    document.getElementById('editId').value='';
    document.getElementById('modal-titulo').textContent='Nuevo Material';
    // fEspecificacion agregado al reset
    ['fNombre','fEspecificacion','fUnidad','fPrecio','fDescripcion'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('overlay').classList.add('open');
}

function cerrarModal() { document.getElementById('overlay').classList.remove('open'); }

async function abrirEditar(id) {
    const r = await api('/materiales/'+id);
    const m = await r.json();
    document.getElementById('editId').value=m.idMaterial;
    document.getElementById('modal-titulo').textContent='Editar Material';
    document.getElementById('fNombre').value=m.nombre||'';
    document.getElementById('fEspecificacion').value=m.especificacion||''; // nuevo
    document.getElementById('fUnidad').value=m.unidad||'';
    document.getElementById('fPrecio').value=m.precioRef||'';
    document.getElementById('fDescripcion').value=m.descripcion||'';
    document.getElementById('overlay').classList.add('open');
}

async function guardar() {
    const id = document.getElementById('editId').value;
    const body = {
        nombre: document.getElementById('fNombre').value,
        especificacion: document.getElementById('fEspecificacion').value || null, // nuevo
        unidad: document.getElementById('fUnidad').value,
        precioRef: +document.getElementById('fPrecio').value || null,
        descripcion: document.getElementById('fDescripcion').value
    };
    if (!body.nombre) return toast('El nombre es requerido', true);
    const url = id ? '/materiales/'+id : '/materiales';
    const method = id ? 'PUT' : 'POST';
    const r = await api(url, {method, body:JSON.stringify(body)});
    if (r.ok) { cerrarModal(); toast(id?'Material actualizado':'Material creado'); cargar(); }
    else { const e=await r.json(); toast(e.message||'Error al guardar', true); }
}

async function eliminar(id) {
    if (!confirm('¿Eliminar este material?')) return;
    const r = await api('/materiales/'+id, {method:'DELETE'});
    if (r.ok) { toast('Material eliminado'); cargar(); }
    else toast('No se puede eliminar (tiene registros asociados)', true);
}

cargar();
</script>
</body>
</html>
