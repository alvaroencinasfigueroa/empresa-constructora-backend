<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Facturas - Empresa Constructora</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#f4f6f8; }
header { background:#1a3a5c; color:white; padding:16px 32px; display:flex; justify-content:space-between; align-items:center; }
header h1 { font-size:18px; }
.nav-links a { color:#aac4e0; text-decoration:none; margin-left:16px; font-size:13px; }
.nav-links a:hover { color:white; }
.container { padding:24px 32px; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
h2 { color:#1a3a5c; font-size:20px; }
.btn { padding:9px 18px; border:none; border-radius:7px; font-size:13px; font-weight:bold; cursor:pointer; }
.btn-primary { background:#1a3a5c; color:white; }
.btn-primary:hover { background:#2a5a8c; }
.btn-sm { padding:5px 11px; font-size:12px; border-radius:5px; border:none; cursor:pointer; font-weight:bold; margin-right:4px; }
.btn-success { background:#d4edda; color:#155724; }
.search { padding:9px 14px; border:1px solid #ccc; border-radius:7px; font-size:13px; width:260px; }
table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.1); }
thead { background:#1a3a5c; color:white; }
th,td { padding:11px 14px; text-align:left; font-size:13px; }
tr:nth-child(even) { background:#f0f4f8; }
tr:hover { background:#dce8f5; }
.badge { padding:3px 10px; border-radius:12px; font-size:11px; font-weight:bold; }
.badge-emitida { background:#fff3cd; color:#856404; }
.badge-pagada { background:#d4edda; color:#155724; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center; }
.overlay.open { display:flex; }
.modal { background:white; border-radius:12px; width:90%; max-width:480px; }
.modal-header { padding:20px 24px 14px; border-bottom:1px solid #e0e0e0; display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { color:#1a3a5c; font-size:16px; }
.close-btn { background:none; border:none; font-size:22px; cursor:pointer; color:#888; }
.modal-body { padding:20px 24px; display:flex; flex-direction:column; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
label { font-size:12px; font-weight:bold; color:#555; text-transform:uppercase; }
input,select { padding:9px 11px; border:1px solid #ccc; border-radius:6px; font-size:13px; width:100%; }
.modal-footer { padding:14px 24px; border-top:1px solid #e0e0e0; display:flex; justify-content:flex-end; gap:10px; }
.toast { position:fixed; bottom:24px; right:24px; background:#1a3a5c; color:white; padding:12px 20px; border-radius:8px; font-size:13px; display:none; z-index:999; }
.toast.error { background:#c0392b; }
.toast.show { display:block; }
.total-preview { background:#e8f0fe; border-left:4px solid #1a3a5c; padding:10px 14px; border-radius:6px; font-size:13px; color:#1a3a5c; font-weight:bold; }
</style>
</head>
<body>
<header>
  <h1>🏗️ Empresa Constructora</h1>
  <div class="nav-links">
    <a href="/index.html">← Dashboard</a>
    <a href="/contratos.html">Contratos</a>
    <a href="/pagos.html">Pagos</a>
  </div>
</header>

<div class="container">
  <div class="top-bar">
    <h2>🧾 Facturas</h2>
    <div style="display:flex;gap:10px;align-items:center">
      <input class="search" type="text" id="busqueda" placeholder="Buscar factura..." oninput="filtrar()">
      <button class="btn btn-primary" id="btnNueva" onclick="abrirModal()">+ Emitir Factura</button>
    </div>
  </div>

  <table>
    <thead>
      <tr><th>#</th><th>Cliente</th><th>Proyecto</th><th>Emisión</th><th>Vencimiento</th><th>Subtotal (Bs.)</th><th>IVA %</th><th>Total (Bs.)</th><th>Estado</th><th>Acciones</th></tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<!-- Modal emitir factura -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <h3>Emitir Factura</h3>
      <button class="close-btn" onclick="cerrarModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Contrato</label>
        <select id="fContrato" onchange="actualizarPreview()">
          <option value="">Seleccionar...</option>
        </select>
      </div>
      <div class="form-group">
        <label>Monto Subtotal (Bs.)</label>
        <input type="number" id="fSubtotal" step="0.01" placeholder="0.00" oninput="actualizarPreview()">
      </div>
      <div class="form-group">
        <label>IVA (%)</label>
        <input type="number" id="fIva" value="13" step="0.01" oninput="actualizarPreview()">
      </div>
      <div class="total-preview" id="previewTotal">Total (Bs.): —</div>
      <div class="form-group">
        <label>Fecha de Emisión</label>
        <input type="date" id="fEmision">
      </div>
      <div class="form-group">
        <label>Fecha de Vencimiento</label>
        <input type="date" id="fVencimiento">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="cerrarModal()" style="background:#e0e0e0">Cancelar</button>
      <button class="btn btn-primary" onclick="guardar()">Emitir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN = localStorage.getItem('token');
if (!TOKEN) location.href='/login.html';
const API = 'http://localhost:8080/api';
const h = { 'Authorization':'Bearer '+TOKEN, 'Content-Type':'application/json' };
const ROL = localStorage.getItem('rol') || '';
let todos = [];

async function api(url, opts={}) {
  const r = await fetch(API+url, {headers:h, ...opts});
  if (r.status===401||r.status===403) { localStorage.clear(); location.href='/login.html'; }
  return r;
}

function toast(msg, err=false) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(err?' error':'');
  setTimeout(()=>t.className='toast',3000);
}

function fmt(n) { return n!=null ? Number(n).toLocaleString('es-BO',{minimumFractionDigits:2}) : '0.00'; }

// Ocultar botón emitir si es cliente
if (ROL === 'CLIENTE') document.getElementById('btnNueva').style.display = 'none';

async function cargar() {
  const esCliente = ROL === 'CLIENTE';
  const idCliente = localStorage.getItem('idCliente');
  const url = esCliente && idCliente ? '/facturas/cliente/'+idCliente : '/facturas';
  const r = await api(url);
  todos = await r.json();
  renderizar(todos);
}

function renderizar(data) {
  const tbody = document.getElementById('tabla');
  if (!data.length) {
    tbody.innerHTML='<tr><td colspan="10" style="text-align:center;padding:30px;color:#888">Sin facturas registradas</td></tr>';
    return;
  }
  const esContador = ['ADMINISTRADOR','CONTADOR'].includes(ROL);
  tbody.innerHTML = data.map(f => `
    <tr>
      <td>${f.idFactura}</td>
      <td>${f.nombreCliente}</td>
      <td>${f.nombreProyecto}</td>
      <td>${f.fechaEmision}</td>
      <td>${f.fechaVencimiento||'-'}</td>
      <td>${fmt(f.montoSubtotal)}</td>
      <td>${f.porcentajeIva}%</td>
      <td><strong>${fmt(f.montoTotal)}</strong></td>
      <td><span class="badge badge-${f.estado.toLowerCase()}">${f.estado}</span></td>
      <td>
        ${esContador && f.estado === 'Emitida'
          ? `<button class="btn-sm btn-success" onclick="marcarPagada(${f.idFactura})">Marcar Pagada</button>`
          : '<span style="color:#888;font-size:12px">${f.estado === "Pagada" ? "Pagada" : "—"}</span>'}
      </td>
    </tr>`).join('');
}

function filtrar() {
  const q = document.getElementById('busqueda').value.toLowerCase();
  renderizar(todos.filter(f =>
    (f.nombreCliente+' '+f.nombreProyecto+' '+f.estado).toLowerCase().includes(q)
  ));
}

async function cargarContratos() {
  const r = await api('/contratos');
  const data = await r.json();
  const sel = document.getElementById('fContrato');
  data.forEach(c => {
    sel.innerHTML += `<option value="${c.idContrato}">#${c.idContrato} — ${c.nombreCliente} / ${c.nombreProyecto}</option>`;
  });
}

function actualizarPreview() {
  const sub = parseFloat(document.getElementById('fSubtotal').value) || 0;
  const iva = parseFloat(document.getElementById('fIva').value) || 13;
  const total = sub + (sub * iva / 100);
  document.getElementById('previewTotal').textContent =
    `Total (Bs.): ${total.toLocaleString('es-BO', {minimumFractionDigits:2})}`;
}

function abrirModal() {
  document.getElementById('fContrato').value='';
  document.getElementById('fSubtotal').value='';
  document.getElementById('fIva').value='13';
  document.getElementById('fEmision').value=new Date().toISOString().split('T')[0];
  document.getElementById('fVencimiento').value='';
  document.getElementById('previewTotal').textContent='Total (Bs.): —';
  document.getElementById('overlay').classList.add('open');
}

function cerrarModal() { document.getElementById('overlay').classList.remove('open'); }

async function guardar() {
  const body = {
    idContrato: +document.getElementById('fContrato').value,
    montoSubtotal: +document.getElementById('fSubtotal').value,
    porcentajeIva: +document.getElementById('fIva').value,
    fechaEmision: document.getElementById('fEmision').value,
    fechaVencimiento: document.getElementById('fVencimiento').value || null
  };
  if (!body.idContrato || !body.montoSubtotal)
    return toast('Contrato y monto son requeridos', true);
  const r = await api('/facturas', {method:'POST', body:JSON.stringify(body)});
  if (r.ok) { cerrarModal(); toast('Factura emitida exitosamente'); cargar(); }
  else { const e=await r.json(); toast(e.message||'Error al emitir factura', true); }
}

async function marcarPagada(id) {
  if (!confirm('¿Marcar esta factura como Pagada?')) return;
  const r = await api('/facturas/'+id+'/pagar', {method:'PATCH'});
  if (r.ok) { toast('Factura marcada como Pagada'); cargar(); }
  else toast('Error al actualizar factura', true);
}

cargar();
cargarContratos();
</script>
</body>
</html>
