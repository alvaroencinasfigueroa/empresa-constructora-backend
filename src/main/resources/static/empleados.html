<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Empleados - Empresa Constructora</title>
    <style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#f4f6f8; }
header { background:#1a3a5c; color:white; padding:16px 32px; display:flex; justify-content:space-between; align-items:center; }
header h1 { font-size:18px; }
.nav-links a { color:#aac4e0; text-decoration:none; margin-left:16px; font-size:13px; }
.nav-links a:hover { color:white; }
.container { padding:24px 32px; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:10px; flex-wrap:wrap; }
h2 { color:#1a3a5c; font-size:20px; }
.search { padding:9px 14px; border:1px solid #ccc; border-radius:7px; font-size:13px; width:260px; }
.btn { padding:9px 18px; border:none; border-radius:7px; font-size:13px; font-weight:bold; cursor:pointer; }
.btn-primary { background:#1a3a5c; color:white; }
.btn-primary:hover { background:#2a5a8c; }
.btn-sm { padding:5px 10px; font-size:12px; border-radius:5px; border:none; cursor:pointer; font-weight:bold; margin-right:4px; }
.btn-edit { background:#d0e8ff; color:#1a3a5c; }
.btn-del { background:#f8d7da; color:#721c24; }
table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.1); }
thead { background:#1a3a5c; color:white; }
th,td { padding:11px 14px; text-align:left; font-size:13px; }
tr:nth-child(even) { background:#f0f4f8; }
tr:hover { background:#dce8f5; }
.badge { padding:3px 10px; border-radius:12px; font-size:11px; font-weight:bold; }
.badge-activo { background:#d4edda; color:#155724; }
.badge-inactivo { background:#f8d7da; color:#721c24; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center; }
.overlay.open { display:flex; }
.modal { background:white; border-radius:12px; width:90%; max-width:580px; max-height:90vh; overflow-y:auto; }
.modal-header { padding:20px 24px 14px; border-bottom:1px solid #e0e0e0; display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { color:#1a3a5c; font-size:16px; }
.close-btn { background:none; border:none; font-size:22px; cursor:pointer; color:#888; }
.modal-body { padding:20px 24px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group.full { grid-column:1/-1; }
label { font-size:12px; font-weight:bold; color:#555; text-transform:uppercase; }
input,select { padding:9px 11px; border:1px solid #ccc; border-radius:6px; font-size:13px; width:100%; }
.modal-footer { padding:14px 24px; border-top:1px solid #e0e0e0; display:flex; justify-content:flex-end; gap:10px; }
.toast { position:fixed; bottom:24px; right:24px; background:#1a3a5c; color:white; padding:12px 20px; border-radius:8px; font-size:13px; display:none; z-index:999; }
.toast.error { background:#c0392b; }
.toast.show { display:block; }
</style>
</head>
<body>
<header>
    <h1>🏗️ Empresa Constructora</h1>
    <div class="nav-links">
        <a href="/index.html">← Dashboard</a>
    </div>
</header>

<div class="container">
    <div class="top-bar">
        <h2>👷 Empleados</h2>
        <div style="display:flex;gap:10px;align-items:center">
            <input class="search" type="text" id="busqueda" placeholder="Buscar empleado..." oninput="filtrar()">
            <button class="btn btn-primary" onclick="abrirModal()">+ Nuevo Empleado</button>
        </div>
    </div>

    <table>
        <thead>
        <tr><th>#</th><th>Nombre Completo</th><th>CI</th><th>Teléfono</th><th>Email</th><th>Contratación</th><th>Salario (Bs.)</th><th>Estado</th><th>Acciones</th></tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</div>

<div class="overlay" id="overlay">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-titulo">Nuevo Empleado</h3>
            <button class="close-btn" onclick="cerrarModal()">×</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editId">
            <div class="form-grid">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="fNombre" placeholder="Nombre">
                </div>
                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" id="fApellido" placeholder="Apellido">
                </div>
                <div class="form-group">
                    <label>CI</label>
                    <input type="text" id="fCi" placeholder="Cédula de identidad">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" id="fTelefono" placeholder="76001122">
                </div>
                <div class="form-group full">
                    <label>Email</label>
                    <input type="email" id="fEmail" placeholder="empleado@constructora.bo">
                </div>
                <div class="form-group">
                    <label>Fecha Contratación</label>
                    <input type="date" id="fFecha">
                </div>
                <div class="form-group">
                    <label>Salario Base (Bs.)</label>
                    <input type="number" id="fSalario" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Cargo (ID)</label>
                    <select id="fCargo"></select>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="fEstado">
                        <option value="true">Activo</option>
                        <option value="false">Inactivo</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="cerrarModal()" style="background:#e0e0e0">Cancelar</button>
            <button class="btn btn-primary" onclick="guardar()">Guardar</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN = localStorage.getItem('token');
if (!TOKEN) location.href='/login.html';
const API = 'http://localhost:8080/api';
const h = { 'Authorization':'Bearer '+TOKEN, 'Content-Type':'application/json' };
let todos = [];

async function api(url, opts={}) {
  const r = await fetch(API+url, {headers:h, ...opts});
  if (r.status===401||r.status===403) { localStorage.clear(); location.href='/login.html'; }
  return r;
}

function toast(msg, err=false) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(err?' error':'');
  setTimeout(()=>t.className='toast',3000);
}

async function cargar() {
  const r = await api('/empleados');
  todos = await r.json();
  renderizar(todos);
}

function renderizar(data) {
  const tbody = document.getElementById('tabla');
  if (!data.length) { tbody.innerHTML='<tr><td colspan="9" style="text-align:center;padding:30px;color:#888">Sin empleados registrados</td></tr>'; return; }
  tbody.innerHTML = data.map(e => `
    <tr>
      <td>${e.idEmpleado}</td>
      <td><strong>${e.nombre} ${e.apellido||''}</strong></td>
      <td>${e.ci||'-'}</td>
      <td>${e.telefono||'-'}</td>
      <td>${e.email||'-'}</td>
      <td>${e.fechaContratacion}</td>
      <td>${e.salarioBase ? Number(e.salarioBase).toLocaleString('es-BO') : '-'}</td>
      <td><span class="badge badge-${e.estado?'activo':'inactivo'}">${e.estado?'Activo':'Inactivo'}</span></td>
      <td>
        <button class="btn-sm btn-edit" onclick="abrirEditar(${e.idEmpleado})">Editar</button>
        <button class="btn-sm btn-del" onclick="eliminar(${e.idEmpleado})">Eliminar</button>
      </td>
    </tr>`).join('');
}

function filtrar() {
  const q = document.getElementById('busqueda').value.toLowerCase();
  renderizar(todos.filter(e => (e.nombre+' '+e.apellido+' '+e.ci).toLowerCase().includes(q)));
}

async function cargarCargos() {
  // Cargos estáticos conocidos del sistema
  const cargos = [
    {idCargo:1,nombre:'Ingeniero Civil'},{idCargo:2,nombre:'Arquitecto'},
    {idCargo:3,nombre:'Técnico'},{idCargo:4,nombre:'Administrativo'},
    {idCargo:5,nombre:'Director de Obra'},{idCargo:6,nombre:'Albañil'},
    {idCargo:8,nombre:'Topógrafo'},
  ];
  const sel = document.getElementById('fCargo');
  cargos.forEach(c => sel.innerHTML += `<option value="${c.idCargo}">${c.nombre}</option>`);
}

function abrirModal() {
  document.getElementById('editId').value='';
  document.getElementById('modal-titulo').textContent='Nuevo Empleado';
  ['fNombre','fApellido','fCi','fTelefono','fEmail','fSalario'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fFecha').value=new Date().toISOString().split('T')[0];
  document.getElementById('fEstado').value='true';
  document.getElementById('overlay').classList.add('open');
}

function cerrarModal() { document.getElementById('overlay').classList.remove('open'); }

async function abrirEditar(id) {
  const r = await api('/empleados/'+id);
  const e = await r.json();
  document.getElementById('editId').value=e.idEmpleado;
  document.getElementById('modal-titulo').textContent='Editar Empleado';
  document.getElementById('fNombre').value=e.nombre||'';
  document.getElementById('fApellido').value=e.apellido||'';
  document.getElementById('fCi').value=e.ci||'';
  document.getElementById('fTelefono').value=e.telefono||'';
  document.getElementById('fEmail').value=e.email||'';
  document.getElementById('fFecha').value=e.fechaContratacion||'';
  document.getElementById('fSalario').value=e.salarioBase||'';
  document.getElementById('fEstado').value=String(e.estado);
  document.getElementById('overlay').classList.add('open');
}

async function guardar() {
  const id = document.getElementById('editId').value;
  const body = {
    nombre: document.getElementById('fNombre').value,
    apellido: document.getElementById('fApellido').value,
    ci: document.getElementById('fCi').value,
    telefono: document.getElementById('fTelefono').value,
    email: document.getElementById('fEmail').value,
    fechaContratacion: document.getElementById('fFecha').value,
    salarioBase: +document.getElementById('fSalario').value,
    estado: document.getElementById('fEstado').value === 'true',
    cargo: { idCargo: +document.getElementById('fCargo').value }
  };
  if (!body.nombre||!body.fechaContratacion) return toast('Nombre y fecha son requeridos', true);
  const url = id ? '/empleados/'+id : '/empleados';
  const method = id ? 'PUT' : 'POST';
  const r = await api(url, {method, body:JSON.stringify(body)});
  if (r.ok) { cerrarModal(); toast(id?'Empleado actualizado':'Empleado creado'); cargar(); }
  else { const e=await r.json(); toast(e.message||'Error al guardar', true); }
}

async function eliminar(id) {
  if (!confirm('¿Eliminar este empleado?')) return;
  const r = await api('/empleados/'+id, {method:'DELETE'});
  if (r.ok) { toast('Empleado eliminado'); cargar(); }
  else toast('No se puede eliminar (tiene registros asociados)', true);
}

cargar();
cargarCargos();
</script>
</body>
</html>
