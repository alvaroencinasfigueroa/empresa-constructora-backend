<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Empleados - Empresa Constructora</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f6f8; }
        header { background: #1a3a5c; color: white; padding: 16px 32px; font-size: 20px; font-weight: bold; }
        .container { padding: 24px 32px; }
        h2 { color: #1a3a5c; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        thead { background: #1a3a5c; color: white; }
        th, td { padding: 12px 16px; text-align: left; font-size: 14px; }
        tr:nth-child(even) { background: #f0f4f8; }
        tr:hover { background: #dce8f5; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge.activo { background: #d4edda; color: #155724; }
        .badge.inactivo { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<header>🏗️ Sistema de Gestión - Empresa Constructora</header>
<div class="container">
    <h2>Empleados</h2>
    <table>
        <thead>
        <tr>
            <th>#</th>
            <th>Nombre completo</th>
            <th>CI</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Fecha contratación</th>
            <th>Salario (Bs.)</th>
            <th>Estado</th>
        </tr>
        </thead>
        <tbody id="tabla-empleados">
        <tr><td colspan="8">Cargando...</td></tr>
        </tbody>
    </table>
</div>
<script>
    fetch('http://localhost:8080/api/empleados')
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('tabla-empleados');
            tbody.innerHTML = '';
            data.forEach(e => {
                const activo = e.estado;
                tbody.innerHTML += `
                    <tr>
                        <td>${e.idEmpleado}</td>
                        <td><strong>${e.nombre} ${e.apellido}</strong></td>
                        <td>${e.ci}</td>
                        <td>${e.telefono ?? '-'}</td>
                        <td>${e.email ?? '-'}</td>
                        <td>${e.fechaContratacion}</td>
                        <td>${e.salarioBase.toLocaleString('es-BO')}</td>
                        <td><span class="badge ${activo ? 'activo' : 'inactivo'}">${activo ? 'Activo' : 'Inactivo'}</span></td>
                    </tr>
                `;
            });
        });
</script>
</body>
</html>
