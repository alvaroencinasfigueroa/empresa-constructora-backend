<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pagos - Empresa Constructora</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#f4f6f8; }
header { background:#1a3a5c; color:white; padding:16px 32px; display:flex; justify-content:space-between; align-items:center; }
header h1 { font-size:18px; }
.nav-links a { color:#aac4e0; text-decoration:none; margin-left:16px; font-size:13px; }
.nav-links a:hover { color:white; }
.container { padding:24px 32px; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
h2 { color:#1a3a5c; font-size:20px; }
.btn { padding:9px 18px; border:none; border-radius:7px; font-size:13px; font-weight:bold; cursor:pointer; }
.btn-primary { background:#1a3a5c; color:white; }
.btn-primary:hover { background:#2a5a8c; }
.btn-sm { padding:5px 11px; font-size:12px; border-radius:5px; border:none; cursor:pointer; font-weight:bold; }
.btn-danger { background:#f8d7da; color:#721c24; }
.filtro { display:flex; gap:10px; margin-bottom:20px; align-items:center; flex-wrap:wrap; }
.filtro label { font-size:13px; font-weight:bold; color:#555; }
.filtro select { padding:8px 11px; border:1px solid #ccc; border-radius:6px; font-size:13px; }
table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.1); }
thead { background:#1a3a5c; color:white; }
th,td { padding:11px 14px; text-align:left; font-size:13px; }
tr:nth-child(even) { background:#f0f4f8; }
tr:hover { background:#dce8f5; }
.badge { padding:3px 10px; border-radius:12px; font-size:11px; font-weight:bold; }
.badge-confirmado { background:#d4edda; color:#155724; }
.badge-anulado { background:#f8d7da; color:#721c24; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center; }
.overlay.open { display:flex; }
.modal { background:white; border-radius:12px; width:90%; max-width:480px; }
.modal-header { padding:20px 24px 14px; border-bottom:1px solid #e0e0e0; display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { color:#1a3a5c; font-size:16px; }
.close-btn { background:none; border:none; font-size:22px; cursor:pointer; color:#888; }
.modal-body { padding:20px 24px; display:flex; flex-direction:column; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
label { font-size:12px; font-weight:bold; color:#555; text-transform:uppercase; }
input,select { padding:9px 11px; border:1px solid #ccc; border-radius:6px; font-size:13px; width:100%; }
.modal-footer { padding:14px 24px; border-top:1px solid #e0e0e0; display:flex; justify-content:flex-end; gap:10px; }
.toast { position:fixed; bottom:24px; right:24px; background:#1a3a5c; color:white; padding:12px 20px; border-radius:8px; font-size:13px; display:none; z-index:999; }
.toast.error { background:#c0392b; }
.toast.show { display:block; }
.info-box { background:#e8f0fe; border-left:4px solid #1a3a5c; padding:12px 16px; border-radius:6px; font-size:13px; color:#1a3a5c; margin-bottom:16px; }
.monto-grande { font-size:15px; font-weight:bold; color:#1a3a5c; }
</style>
</head>
<body>
<header>
  <h1>🏗️ Empresa Constructora</h1>
  <div class="nav-links">
    <a href="/index.html">← Dashboard</a>
    <a href="/contratos.html">Contratos</a>
    <a href="/cuotas.html">Cuotas</a>
  </div>
</header>

<div class="container">
  <div class="top-bar">
    <h2>💰 Pagos</h2>
    <button class="btn btn-primary" onclick="abrirModal()">+ Registrar Pago</button>
  </div>

  <div class="filtro">
    <label>Filtrar por Contrato:</label>
    <select id="selContrato" onchange="cargarPagos()">
      <option value="">Todos los pagos</option>
    </select>
  </div>

  <table>
    <thead>
      <tr><th>#</th><th>Cliente</th><th>Proyecto</th><th>Fecha</th><th>Monto (Bs.)</th><th>Método</th><th>Comprobante</th><th>Estado</th><th>Acciones</th></tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<!-- Modal registrar pago -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <h3>Registrar Pago</h3>
      <button class="close-btn" onclick="cerrarModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Contrato</label>
        <select id="pagoContrato" onchange="cargarCuotasPendientes()">
          <option value="">Seleccionar...</option>
        </select>
      </div>
      <div class="form-group">
        <label>Cuota a Cancelar (opcional)</label>
        <select id="pagoCuota"><option value="">Sin cuota específica</option></select>
      </div>
      <div class="form-group">
        <label>Monto (Bs.)</label>
        <input type="number" id="pagoMonto" step="0.01" placeholder="0.00">
      </div>
      <div class="form-group">
        <label>Fecha de Pago</label>
        <input type="date" id="pagoFecha">
      </div>
      <div class="form-group">
        <label>Método de Pago</label>
        <select id="pagoMetodo">
          <option value="1">Efectivo</option>
          <option value="2">Transferencia bancaria</option>
          <option value="3">Cheque</option>
        </select>
      </div>
      <div class="form-group">
        <label>Número de Comprobante</label>
        <input type="text" id="pagoComprobante" placeholder="Ej: TRF-2026-001">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="cerrarModal()" style="background:#e0e0e0">Cancelar</button>
      <button class="btn btn-primary" onclick="guardar()">Registrar Pago</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN = localStorage.getItem('token');
if (!TOKEN) location.href='/login.html';
const API = 'http://localhost:8080/api';
const h = { 'Authorization':'Bearer '+TOKEN, 'Content-Type':'application/json' };

const params = new URLSearchParams(location.search);
const contratoParam = params.get('contrato');
const cuotaParam = params.get('cuota');

async function api(url, opts={}) {
  const r = await fetch(API+url, {headers:h, ...opts});
  if (r.status===401||r.status===403) { localStorage.clear(); location.href='/login.html'; }
  return r;
}

function toast(msg, err=false) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(err?' error':'');
  setTimeout(()=>t.className='toast',3000);
}

function fmt(n) { return n!=null ? Number(n).toLocaleString('es-BO',{minimumFractionDigits:2}) : '0.00'; }

async function cargarContratos() {
  const r = await api('/contratos');
  const data = await r.json();
  const sel = document.getElementById('selContrato');
  const selPago = document.getElementById('pagoContrato');
  data.forEach(c => {
    const opt = `<option value="${c.idContrato}">#${c.idContrato} — ${c.nombreCliente} / ${c.nombreProyecto}</option>`;
    sel.innerHTML += opt;
    selPago.innerHTML += opt;
  });
  if (contratoParam) {
    sel.value = contratoParam;
    document.getElementById('pagoContrato').value = contratoParam;
    cargarPagos();
    if (cuotaParam) {
      await cargarCuotasPendientes();
      document.getElementById('pagoCuota').value = cuotaParam;
      abrirModal();
    }
  } else {
    cargarPagos();
  }
}

async function cargarPagos() {
  const id = document.getElementById('selContrato').value;
  const url = id ? '/pagos/contrato/'+id : null;
  if (!url) {
    document.getElementById('tabla').innerHTML='<tr><td colspan="9" style="text-align:center;padding:30px;color:#888">Seleccioná un contrato para ver sus pagos</td></tr>';
    return;
  }
  const r = await api(url);
  const data = await r.json();
  const tbody = document.getElementById('tabla');
  if (!data.length) {
    tbody.innerHTML='<tr><td colspan="9" style="text-align:center;padding:30px;color:#888">No hay pagos registrados para este contrato</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(p => `
    <tr>
      <td>${p.idPago}</td>
      <td>${p.nombreCliente}</td>
      <td>${p.nombreProyecto}</td>
      <td>${p.fechaPago}</td>
      <td class="monto-grande">Bs. ${fmt(p.monto)}</td>
      <td>${p.metodoPago}</td>
      <td>${p.numeroComprobante||'-'}</td>
      <td><span class="badge badge-${p.estado.toLowerCase()}">${p.estado}</span></td>
      <td>
        ${p.estado==='Confirmado' ? `<button class="btn-sm btn-danger" onclick="anular(${p.idPago})">Anular</button>` : '<span style="color:#888;font-size:12px">Anulado</span>'}
      </td>
    </tr>`).join('');
}

async function cargarCuotasPendientes() {
  const idContrato = document.getElementById('pagoContrato').value;
  const sel = document.getElementById('pagoCuota');
  sel.innerHTML = '<option value="">Sin cuota específica</option>';
  if (!idContrato) return;
  const r = await api('/cuotas/contrato/'+idContrato);
  const data = await r.json();
  data.filter(c=>c.estado!=='Pagado').forEach(c => {
    sel.innerHTML += `<option value="${c.idCuota}">Cuota ${c.numeroCuota} — Bs. ${fmt(c.montoEsperado)} — Vence: ${c.fechaVencimiento} [${c.estado}]</option>`;
  });
  // Si venía cuota preseleccionada
  if (cuotaParam) sel.value = cuotaParam;
}

function abrirModal() {
  // Setear fecha de hoy
  document.getElementById('pagoFecha').value = new Date().toISOString().split('T')[0];
  document.getElementById('overlay').classList.add('open');
}
function cerrarModal() { document.getElementById('overlay').classList.remove('open'); }

async function guardar() {
  const body = {
    idContrato: +document.getElementById('pagoContrato').value,
    monto: +document.getElementById('pagoMonto').value,
    fechaPago: document.getElementById('pagoFecha').value,
    idMetodoPago: +document.getElementById('pagoMetodo').value,
    numeroComprobante: document.getElementById('pagoComprobante').value,
    idCuota: document.getElementById('pagoCuota').value ? +document.getElementById('pagoCuota').value : null,
  };
  if (!body.idContrato||!body.monto||!body.fechaPago)
    return toast('Complete los campos requeridos', true);
  const r = await api('/pagos', {method:'POST', body:JSON.stringify(body)});
  if (r.ok) { cerrarModal(); toast('Pago registrado exitosamente'); cargarPagos(); }
  else { const e=await r.json(); toast(e.message||'Error al registrar pago', true); }
}

async function anular(id) {
  if (!confirm('¿Anular este pago? La cuota vinculada volverá a estado Pendiente.')) return;
  const r = await api('/pagos/'+id+'/anular', {method:'PATCH'});
  if (r.ok) { toast('Pago anulado'); cargarPagos(); }
  else toast('Error al anular pago', true);
}

cargarContratos();
</script>
</body>
</html>
