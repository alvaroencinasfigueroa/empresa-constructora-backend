<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Maquinaria - Empresa Constructora</title>
    <style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#f4f6f8; }
header { background:#1a3a5c; color:white; padding:16px 32px; display:flex; justify-content:space-between; align-items:center; }
header h1 { font-size:18px; }
.nav-links a { color:#aac4e0; text-decoration:none; margin-left:16px; font-size:13px; }
.nav-links a:hover { color:white; }
.container { padding:24px 32px; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:10px; flex-wrap:wrap; }
h2 { color:#1a3a5c; font-size:20px; }
.search { padding:9px 14px; border:1px solid #ccc; border-radius:7px; font-size:13px; width:260px; }
.btn { padding:9px 18px; border:none; border-radius:7px; font-size:13px; font-weight:bold; cursor:pointer; }
.btn-primary { background:#1a3a5c; color:white; }
.btn-primary:hover { background:#2a5a8c; }
.btn-sm { padding:5px 10px; font-size:12px; border-radius:5px; border:none; cursor:pointer; font-weight:bold; margin-right:4px; }
.btn-edit { background:#d0e8ff; color:#1a3a5c; }
.btn-del { background:#f8d7da; color:#721c24; }
table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.1); }
thead { background:#1a3a5c; color:white; }
th,td { padding:11px 14px; text-align:left; font-size:13px; }
tr:nth-child(even) { background:#f0f4f8; }
tr:hover { background:#dce8f5; }
.badge { padding:3px 10px; border-radius:12px; font-size:11px; font-weight:bold; }
.badge-disponible { background:#d4edda; color:#155724; }
.badge-en-uso { background:#fff3cd; color:#856404; }
.badge-mantenimiento { background:#f8d7da; color:#721c24; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center; }
.overlay.open { display:flex; }
.modal { background:white; border-radius:12px; width:90%; max-width:520px; max-height:90vh; overflow-y:auto; }
.modal-header { padding:20px 24px 14px; border-bottom:1px solid #e0e0e0; display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { color:#1a3a5c; font-size:16px; }
.close-btn { background:none; border:none; font-size:22px; cursor:pointer; color:#888; }
.modal-body { padding:20px 24px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group.full { grid-column:1/-1; }
label { font-size:12px; font-weight:bold; color:#555; text-transform:uppercase; }
input,select { padding:9px 11px; border:1px solid #ccc; border-radius:6px; font-size:13px; width:100%; }
.modal-footer { padding:14px 24px; border-top:1px solid #e0e0e0; display:flex; justify-content:flex-end; gap:10px; }
.toast { position:fixed; bottom:24px; right:24px; background:#1a3a5c; color:white; padding:12px 20px; border-radius:8px; font-size:13px; display:none; z-index:999; }
.toast.error { background:#c0392b; }
.toast.show { display:block; }
    </style>
</head>
<body>
<header>
    <h1>🏗️ Empresa Constructora</h1>
    <div class="nav-links">
        <a href="/index.html">← Dashboard</a>
    </div>
</header>

<div class="container">
    <div class="top-bar">
        <h2>🚜 Maquinaria</h2>
        <div style="display:flex;gap:10px;align-items:center">
            <input class="search" type="text" id="busqueda" placeholder="Buscar maquinaria..." oninput="filtrar()">
            <button class="btn btn-primary" onclick="abrirModal()">+ Nueva Maquinaria</button>
        </div>
    </div>

    <table>
        <thead>
        <tr><th>#</th><th>Nombre</th><th>Modelo</th><th>Nº Serie</th><th>Estado</th><th>Acciones</th></tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</div>

<div class="overlay" id="overlay">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-titulo">Nueva Maquinaria</h3>
            <button class="close-btn" onclick="cerrarModal()">×</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editId">
            <div class="form-grid">
                <div class="form-group full">
                    <label>Nombre</label>
                    <input type="text" id="fNombre" placeholder="Ej: Mezcladora de concreto">
                </div>
                <div class="form-group">
                    <label>Modelo</label>
                    <input type="text" id="fModelo" placeholder="Ej: CIPSA 350L">
                </div>
                <div class="form-group">
                    <label>Nº de Serie</label>
                    <input type="text" id="fNumeroSerie" placeholder="Ej: MX-001-2022">
                </div>
                <div class="form-group full">
                    <label>Estado</label>
                    <select id="fEstado">
                        <option value="Disponible">Disponible</option>
                        <option value="En uso">En uso</option>
                        <option value="Mantenimiento">Mantenimiento</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="cerrarModal()" style="background:#e0e0e0">Cancelar</button>
            <button class="btn btn-primary" onclick="guardar()">Guardar</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN = localStorage.getItem('token');
if (!TOKEN) location.href='/login.html';
const API = 'http://localhost:8080/api';
const h = { 'Authorization':'Bearer '+TOKEN, 'Content-Type':'application/json' };
let todos = [];

async function api(url, opts={}) {
    const r = await fetch(API+url, {headers:h, ...opts});
    if (r.status===401||r.status===403) { localStorage.clear(); location.href='/login.html'; }
    return r;
}

function toast(msg, err=false) {
    const t = document.getElementById('toast');
    t.textContent=msg; t.className='toast show'+(err?' error':'');
    setTimeout(()=>t.className='toast', 3000);
}

function badgeEstado(estado) {
    if (!estado) return '';
    const cls = estado === 'Disponible' ? 'disponible' : estado === 'En uso' ? 'en-uso' : 'mantenimiento';
    return `<span class="badge badge-${cls}">${estado}</span>`;
}

async function cargar() {
    const r = await api('/maquinaria');
    todos = await r.json();
    renderizar(todos);
}

function renderizar(data) {
    const tbody = document.getElementById('tabla');
    if (!data.length) {
        tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:30px;color:#888">Sin maquinaria registrada</td></tr>';
        return;
    }
    tbody.innerHTML = data.map(m => `
        <tr>
            <td>${m.idMaquinaria}</td>
            <td><strong>${m.nombre}</strong></td>
            <td>${m.modelo||'-'}</td>
            <td>${m.numeroSerie||'-'}</td>
            <td>${badgeEstado(m.estado)}</td>
            <td>
                <button class="btn-sm btn-edit" onclick="abrirEditar(${m.idMaquinaria})">Editar</button>
                <button class="btn-sm btn-del" onclick="eliminar(${m.idMaquinaria})">Eliminar</button>
            </td>
        </tr>`).join('');
}

function filtrar() {
    const q = document.getElementById('busqueda').value.toLowerCase();
    renderizar(todos.filter(m =>
        (m.nombre+' '+(m.modelo||'')+' '+(m.numeroSerie||'')).toLowerCase().includes(q)
    ));
}

function abrirModal() {
    document.getElementById('editId').value='';
    document.getElementById('modal-titulo').textContent='Nueva Maquinaria';
    ['fNombre','fModelo','fNumeroSerie'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('fEstado').value='Disponible';
    document.getElementById('overlay').classList.add('open');
}

function cerrarModal() { document.getElementById('overlay').classList.remove('open'); }

async function abrirEditar(id) {
    const r = await api('/maquinaria/'+id);
    const m = await r.json();
    document.getElementById('editId').value=m.idMaquinaria;
    document.getElementById('modal-titulo').textContent='Editar Maquinaria';
    document.getElementById('fNombre').value=m.nombre||'';
    document.getElementById('fModelo').value=m.modelo||'';
    document.getElementById('fNumeroSerie').value=m.numeroSerie||'';
    document.getElementById('fEstado').value=m.estado||'Disponible';
    document.getElementById('overlay').classList.add('open');
}

async function guardar() {
    const id = document.getElementById('editId').value;
    const body = {
        nombre: document.getElementById('fNombre').value,
        modelo: document.getElementById('fModelo').value,
        numeroSerie: document.getElementById('fNumeroSerie').value,
        estado: document.getElementById('fEstado').value
    };
    if (!body.nombre) return toast('El nombre es requerido', true);
    const url = id ? '/maquinaria/'+id : '/maquinaria';
    const method = id ? 'PUT' : 'POST';
    const r = await api(url, {method, body:JSON.stringify(body)});
    if (r.ok) { cerrarModal(); toast(id?'Maquinaria actualizada':'Maquinaria creada'); cargar(); }
    else { const e=await r.json(); toast(e.message||'Error al guardar', true); }
}

async function eliminar(id) {
    if (!confirm('¿Eliminar esta maquinaria?')) return;
    const r = await api('/maquinaria/'+id, {method:'DELETE'});
    if (r.ok) { toast('Maquinaria eliminada'); cargar(); }
    else toast('No se puede eliminar (tiene asignaciones asociadas)', true);
}

cargar();
</script>
</body>
</html>
